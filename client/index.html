<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>To-Do-List</title>
</head>
<body>
    <div class="container" >
        <div class="card">
           <div class="top">
             <h1>To-Do List</h1>
            <a href="#" class="export-btn">Export to Excel</a>
           </div>
          <div class="search-tag">
              <search>
                <input type="text"id="inputField" size="20x0" placeholder="Add a new task...">
              </search>
            <a class="add-btn" onclick="addTask()">Add</a>
          </div>
            <ul class="task-list" id="tasklist">
                <li >
                    <span >Sample Task 1</span>
                    <a href="#" class="deleteBtn">Delete</a>
                </li>
                <li>
                    <span>Sample Task 2</span>
                    <a href="#" class="deleteBtn">Delete</a>
                </li>
                  <li>
                    <span>Sample Task 3</span>
                    <a href="#" class="deleteBtn">Delete</a>
                </li>
            </ul>

        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
